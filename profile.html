{% extends "base.html" %}
{% block title %}Login · Future Envelope{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-seal">✉</div>
    <h1 class="auth-title">Future Envelope</h1>
    <p class="auth-subtitle">Messages across time, delivered with intention.</p>

    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required
               placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required
               placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="form-check">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Remember me</label>
      </div>
      <button type="submit" class="btn-primary btn-full">Unseal the Vault →</button>
    </form>

    <p class="auth-switch">
      No account? <a href="{{ url_for('main.signup') }}">Create one</a>
    </p>
  </div>
  <div class="auth-deco">
    <div class="wax-seal">F·E</div>
    <p class="tagline">"Write to the future.<br>Let time be the courier."</p>
  </div>
</div>
{% endblock %}
